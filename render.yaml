services:
  - type: web
    name: openhand
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENHAND_STATE_DIR
        value: /data/.openhand
      - key: OPENHAND_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENHAND_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openhand-data
      mountPath: /data
      sizeGB: 1
